schema_version: 1

context:
  version: "3.0.0"

package:
  name: sherpa
  version: ${{ version }}

source:
  url: https://gitlab.com/sherpa-team/sherpa/-/archive/v${{ version }}/sherpa-v${{ version }}.tar.gz
  sha256: e460d8798b323c4ef663293a2c918b1463e9641b35703a54d70d25c852c67d36
  patches:
    # Allow for modern CMake
    - set-cmake_minimum_required-policy_max.patch
    # Sherpa misuses add_custom_command keywords (PRE_BUILD on an OUTPUT command in
    # the Python bindings; DEPENDS on a TARGET command for the NNPDF unpack). Older
    # CMake ignored them, but they are hard errors under the policy_max above.
    - fix-add_custom_command-keywords.patch
    # conda relocation pads the shortened install prefix with embedded NUL bytes;
    # std::string keeps them but stat(2)/dlopen(3) truncate at the first NUL, so
    # baked library paths resolve to a directory and Sherpa aborts at runtime with
    # "dlopen(${PREFIX}/lib/SHERPA-MC/): not a file" (seen on osx-arm64/aarch64).
    # Strip NULs where such paths are read and used.
    - remove-null-characters-for-prefix-replacement.patch
    - strip-null-bytes-in-Library_Loader.patch

build:
  number: 0
  skip: win

requirements:
  run_exports:
    - ${{ pin_subpackage("sherpa", upper_bound="x.x") }}
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("fortran") }}
    - cmake
    - ninja
    - pkg-config
    - which
    - grep
    - sed
    # python bindings
    - swig
  host:
    - sqlite
    - lhapdf
    - hepmc3
    - libzip
    - python
  # Amegic compiles process libraries at runtime ('makelibs'), which drives
  # CMake, so users need cmake + ninja + a C++ compiler at run time.
  # Intentionally overrides no-compilers-in-run.
  run:
    - lhapdf
    - hepmc3
    - cmake
    - ninja
    - if: osx
      then: clangxx
    - if: linux
      then: gxx
    - python

tests:
  - package_contents:
      strict: true
      bin:
        - Sherpa
        - Sherpa-config
        - init_nlo.sh
        - plot_stats.sh
        # sconsloops, plot_graphs and makelibs install under share/SHERPA-MC/
        # in v3 (covered by the share/SHERPA-MC/* glob below); make2scons and
        # get_bibtex are no longer shipped.
      lib:
        - SHERPA-MC/*
      include:
        - SHERPA-MC/AHADIC++/*
        - SHERPA-MC/AMEGIC++/*
        - SHERPA-MC/AMISIC++/*
        - SHERPA-MC/ATOOLS/*
        # AddOns/Python ships MEProcess.H only when the Python bindings are built
        - SHERPA-MC/AddOns/Python/*
        - SHERPA-MC/BEAM/*
        - SHERPA-MC/COMIX/*
        - SHERPA-MC/CSSHOWER++/*
        - SHERPA-MC/DIM/*
        - SHERPA-MC/DIRE/*
        - SHERPA-MC/EXTAMP/*
        - SHERPA-MC/EXTRA_XS/*
        - SHERPA-MC/HADRONS++/*
        - SHERPA-MC/MCATNLO/*
        - SHERPA-MC/METOOLS/*
        - SHERPA-MC/MODEL/*
        - SHERPA-MC/PDF/*
        - SHERPA-MC/PHASIC++/*
        - SHERPA-MC/PHOTONS++/*
        - SHERPA-MC/RECONNECTIONS/*
        - SHERPA-MC/REMNANTS/*
        - SHERPA-MC/SHERPA/*
        - SHERPA-MC/SHRiMPS/*
        - SHERPA-MC/YFS/*
      files:
        - share/SHERPA-MC/*
        - etc/conda/test-files/sherpa/0/*
        # Python bindings (one build per python version; path is version-specific)
        - lib/python*/site-packages/Sherpa.py
        - lib/python*/site-packages/_Sherpa.so
        - lib/python*/site-packages/__pycache__/Sherpa.cpython-*.pyc

  - files:
      source:
        - Examples
      recipe:
        - tests/amegic_compile/Sherpa.yaml
    script:
      - Sherpa-config
      - 'echo "# Sherpa-config --version: $(Sherpa-config --version)"'
      - 'echo "# Sherpa-config --prefix: $(Sherpa-config --prefix)"'
      - 'echo "# Sherpa-config --incdir: $(Sherpa-config --incdir)"'
      - 'echo "# Sherpa-config --libs: $(Sherpa-config --libs)"'
      - 'echo "# Sherpa-config --datadir: $(Sherpa-config --datadir)"'
      - 'echo "# Sherpa-config --ldflags: $(Sherpa-config --ldflags)"'
      - 'echo "# Sherpa-config --cppflags: $(Sherpa-config --cppflags)"'
      - 'echo "# Sherpa-config --cxx: $(Sherpa-config --cxx)"'
      - 'echo "# Sherpa-config --fc: $(Sherpa-config --fc)"'
      - 'echo "# Sherpa-config --python-libs: $(Sherpa-config --python-libs)"'

      # baked compiler must be generic (clang++/g++), not the build triplet,
      # and the triplet must not survive anywhere in the generated wrappers
      - 'case "$(Sherpa-config --cxx)" in *-apple-darwin* | *conda-linux-gnu*) exit 1 ;; esac'
      - '! grep -E "(apple-darwin[0-9.]+|conda-linux-gnu)-(clang|gcc|c\+\+|g\+\+|gfortran)" "${PREFIX}/bin/Sherpa-config" "${PREFIX}/share/SHERPA-MC/makelibs"'
      - Sherpa --help
      - if: build_platform == target_platform
        then:
          - cd Examples/CI/LO_Z
          - lhapdf install PDF4LHC21_40_pdfas &> download_log.txt
          - lhapdf install PDF4LHC21_40_pdfas
          - Sherpa
          - cd -
          # Test the Amegic runtime-compilation path (LO, no loop provider needed).
          - cd tests/amegic_compile
          - Sherpa || true             # pass 1: write process source (exits non-zero by design)
          - CMAKE_GENERATOR=Ninja ./makelibs -j2   # compile (makelibs drives CMake; force Ninja)
          - Sherpa > pass2.log 2>&1 || { cat pass2.log; false; }   # pass 2: run with compiled libs
          - 'grep -q "Generated events: 100" pass2.log'
          - 'grep -q "XS =" pass2.log'   # v3 reports the cross section as "XS = <value> pb +- (...)"

about:
  summary: A Monte Carlo event generator for the Simulation of High-Energy Reactions of PArticles
  description: |
    Sherpa is a Monte Carlo event generator for the Simulation of High-Energy
    Reactions of PArticles in lepton-lepton, lepton-photon, photon-photon,
    lepton-hadron and hadron-hadron collisions. Simulation programs - also
    dubbed event generators - like Sherpa are indispensable work horses for
    current particle physics phenomenology and are (at) the interface between
    theory and experiment.
  license: GPL-3.0-or-later
  license_file: COPYING
  homepage: https://gitlab.com/sherpa-team/sherpa
  repository: https://gitlab.com/sherpa-team/sherpa
  documentation: https://sherpa-team.gitlab.io/

extra:
  recipe-maintainers:
    - chrisburr
    - kratsg
    - matthewfeickert
