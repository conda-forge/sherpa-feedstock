# Drell-Yan (pp -> e+ e-) at leading order, forced through Amegic.
#
# Purpose: exercise the Amegic runtime-compilation path (write process
# source -> ./makelibs -> reload), which the default CI/LO_Z example does
# NOT, because it runs through Comix. Unlike the bundled Amegic examples,
# this stays at LO (Order QCD: 0, EW: 2) so it needs no external one-loop
# provider (BlackHat/OpenLoops) and is otherwise self-contained.
EVENTS: 100
ME_GENERATORS: Amegic # force process-library generation + compile

BEAMS: 2212
BEAM_ENERGIES: 7000

PROCESSES:
  - 93 93 -> 11 -11:
      Order: { QCD: 0, EW: 2 }
      Integration_Error: 0.05

SELECTORS:
  - [Mass, 11, -11, 66, 166]
